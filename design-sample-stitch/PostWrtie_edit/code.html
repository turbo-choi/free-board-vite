<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Post Write/Edit Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0da2e7",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display flex flex-col min-h-screen text-slate-900 dark:text-slate-100 overflow-hidden">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
<!-- Modal Content -->
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-[800px] max-h-[90vh] flex flex-col overflow-hidden animate-fade-in-up">
<!-- Modal Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800 shrink-0 sticky top-0 z-10">
<div class="flex flex-col gap-1">
<h2 class="text-xl font-bold text-slate-900 dark:text-white">Create New Post</h2>
<p class="text-sm text-slate-500 dark:text-slate-400">Share updates, resources, or questions with the team.</p>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto p-6 space-y-6 bg-background-light dark:bg-background-dark/50">
<!-- Title Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="post-title">
                        Post Title <span class="text-red-500">*</span>
</label>
<input class="w-full h-12 px-4 rounded-lg border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:border-primary focus:ring-primary focus:ring-1 transition-all" id="post-title" placeholder="Enter a descriptive title for your post" type="text"/>
<!-- Error Message Example (Hidden by default, showing logic here for completeness) -->
<!-- <p class="text-xs text-red-500 mt-1">Title is required.</p> -->
</div>
<!-- Category Dropdown -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="category">
                        Category
                    </label>
<div class="relative">
<select class="w-full h-12 pl-4 pr-10 rounded-lg border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:border-primary focus:ring-primary focus:ring-1 appearance-none transition-all cursor-pointer" id="category">
<option disabled="" selected="" value="">Select a category...</option>
<option value="notice">Notice</option>
<option value="free">Free</option>
<option value="resource">Resource</option>
<option value="qa">Q&amp;A</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-500">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</div>
</div>
<!-- Rich Text Editor -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
                        Content
                    </label>
<div class="w-full rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 overflow-hidden focus-within:ring-1 focus-within:ring-primary focus-within:border-primary transition-all shadow-sm">
<!-- Toolbar -->
<div class="flex items-center gap-1 p-2 border-b border-slate-100 dark:border-slate-600 bg-slate-50 dark:bg-slate-800/50">
<button class="p-1.5 text-slate-500 dark:text-slate-400 hover:text-primary hover:bg-primary/10 rounded transition-colors" title="Bold">
<span class="material-symbols-outlined text-[20px]">format_bold</span>
</button>
<button class="p-1.5 text-slate-500 dark:text-slate-400 hover:text-primary hover:bg-primary/10 rounded transition-colors" title="Italic">
<span class="material-symbols-outlined text-[20px]">format_italic</span>
</button>
<button class="p-1.5 text-slate-500 dark:text-slate-400 hover:text-primary hover:bg-primary/10 rounded transition-colors" title="Underline">
<span class="material-symbols-outlined text-[20px]">format_underlined</span>
</button>
<div class="w-px h-5 bg-slate-200 dark:bg-slate-600 mx-1"></div>
<button class="p-1.5 text-slate-500 dark:text-slate-400 hover:text-primary hover:bg-primary/10 rounded transition-colors" title="List">
<span class="material-symbols-outlined text-[20px]">format_list_bulleted</span>
</button>
<button class="p-1.5 text-slate-500 dark:text-slate-400 hover:text-primary hover:bg-primary/10 rounded transition-colors" title="Ordered List">
<span class="material-symbols-outlined text-[20px]">format_list_numbered</span>
</button>
<div class="w-px h-5 bg-slate-200 dark:bg-slate-600 mx-1"></div>
<button class="p-1.5 text-slate-500 dark:text-slate-400 hover:text-primary hover:bg-primary/10 rounded transition-colors" title="Link">
<span class="material-symbols-outlined text-[20px]">link</span>
</button>
<button class="p-1.5 text-slate-500 dark:text-slate-400 hover:text-primary hover:bg-primary/10 rounded transition-colors" title="Image">
<span class="material-symbols-outlined text-[20px]">image</span>
</button>
</div>
<!-- Text Area Container with Avatar -->
<div class="flex items-start p-4 gap-3 min-h-[200px]">
<div class="w-8 h-8 rounded-full overflow-hidden shrink-0 bg-slate-200 dark:bg-slate-600" data-alt="User Avatar Placeholder" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDIC353Z9Ag4Z0g2tGZQq6edXtkAuF4_tSQYvaxMiV2nCP7gqqnnXlw2WnRi-HwulHEjtgQyKeuheK7e6oG8P__vj-ojfK61FUDPPKFWU7mazsJVG6eBjdsRGmUa-0wfuTEmU0H_pmScAhtHlpuvsTXv8OAiOryHBXaZG3j8WwsiGspccBu2tB4hcVoc2P4ibQhdeDoWILGZCp-rVuLbsND6aXGe7LzBZWbi1oqKM79m6V0HWB9M8Cc1ihdc5GCck1xKOBKD4VuvG8'); background-size: cover;"></div>
<textarea class="w-full h-full min-h-[180px] bg-transparent border-0 p-0 text-slate-900 dark:text-white placeholder-slate-400 focus:ring-0 resize-none text-base leading-relaxed" placeholder="Write your post content here..."></textarea>
</div>
</div>
</div>
<!-- File Upload -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
                        Attachments
                    </label>
<div class="group relative flex flex-col items-center justify-center rounded-lg border-2 border-dashed border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-800/30 px-6 py-10 transition-colors hover:bg-primary/5 hover:border-primary/50 dark:hover:bg-primary/10 cursor-pointer">
<div class="flex items-center justify-center w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-700 mb-4 group-hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-primary text-2xl">cloud_upload</span>
</div>
<div class="text-center space-y-1">
<p class="text-sm font-medium text-slate-900 dark:text-white">
<span class="text-primary hover:underline">Click to upload</span> or drag and drop
                            </p>
<p class="text-xs text-slate-500 dark:text-slate-400">SVG, PNG, JPG or GIF (max. 5MB)</p>
</div>
<input class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="flex items-center justify-end gap-3 px-6 py-4 bg-white dark:bg-slate-800 border-t border-slate-100 dark:border-slate-700 shrink-0">
<button class="px-5 py-2.5 text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors">
                    Cancel
                </button>
<button class="px-5 py-2.5 text-sm font-medium text-primary border border-primary/30 hover:bg-primary/5 rounded-lg transition-colors">
                    Save as Draft
                </button>
<button class="px-6 py-2.5 text-sm font-medium text-white bg-primary hover:bg-[#098bc5] shadow-sm shadow-primary/30 rounded-lg transition-colors flex items-center gap-2">
<span>Publish Post</span>
<span class="material-symbols-outlined text-lg">send</span>
</button>
</div>
</div>
</div>
</body></html>
